openapi: 3.0.3

info:

  title: PushHard API

  description: |
    Self-hosted deployment automation platform.
    Spec-first contract — source of truth for api (PHP), web (Vue), and MCP.
    Public webhooks and SSE stream live in routes/web.php (no /api/ prefix)
    and are documented in docs/api.md, not in this spec.

  version: 2.0.0

servers:

  - url: http://localhost:8000/api

    description: Local development

tags:

  - name: Auth

  - name: Profile

  - name: Tokens

  - name: Projects

  - name: Webhooks

  - name: Bindings

  - name: Servers

  - name: Deployments

components:

  securitySchemes:

    sanctum:

      type: http

      scheme: bearer

  schemas:

    Project:

      type: object

      properties:

        id: { type: string, description: "PublicId (ULID)" }

        name: { type: string }

        github_repo: { type: string }

        repository_url: { type: string, nullable: true }

        github_branch: { type: string }

        is_private: { type: boolean }

        repo_auth_type: { type: string, default: none, enum: [ none, https, ssh ] }

        repo_auth_username: { type: string, nullable: true }

        repo_auth_configured: { type: boolean }

        created_at: { type: string, format: date-time }

        updated_at: { type: string, format: date-time }

    Server:

      type: object

      properties:

        id: { type: string, description: "PublicId (ULID)" }

        name: { type: string }

        host: { type: string }

        port: { type: integer }

        user: { type: string }

        server_type: { type: string, enum: [ regular, build ] }

        auth_type: { type: string, enum: [ key, password ] }

        projects_count: { type: integer }

        deployments_count: { type: integer }

        created_at: { type: string, format: date-time }

        updated_at: { type: string, format: date-time }

    ServerSummary:

      type: object

      properties:

        id: { type: string, description: "PublicId (ULID)" }

        name: { type: string }

        host: { type: string }

        server_type: { type: string, enum: [ regular, build ] }

    DeploymentProjectSummary:

      type: object

      properties:

        id: { type: string, description: "PublicId (ULID)" }

        name: { type: string }

    ServerBindingRecipe:

      type: string

      enum: [ laravel, php, node, go, docker_compose ]

    DockerComposeMigrationTiming:

      type: string

      enum: [ before_up, after_up ]

    DockerComposeRecipeOptions:

      type: object

      description: Docker Compose deployment recipe settings. Compose paths are repository-relative and are validated again after source checkout.

      required: [ compose_file ]

      additionalProperties: false

      properties:

        compose_file:
          type: string
          description: Repository-relative Docker Compose YAML path.
          example: docker-compose.yml
          maxLength: 500

        env_file:
          type: string
          nullable: true
          description: Optional repository-relative Compose env file path. This is not PushHard managed env content.
          example: .env.production
          maxLength: 500

        test_commands:
          type: array
          description: Optional pre-deploy commands, one command per item.
          items: { type: string, maxLength: 2000 }

        smoke_commands:
          type: array
          description: Optional post-up smoke commands, one command per item.
          items: { type: string, maxLength: 2000 }

        migration_command:
          type: string
          nullable: true
          description: Optional migration command executed at migration_timing.
          maxLength: 2000

        migration_timing:
          $ref: '#/components/schemas/DockerComposeMigrationTiming'

        image_transport:
          type: string
          enum: [ archive_copy ]
          default: archive_copy
          description: MVP transport for built images. Registry transport is intentionally unsupported.

    ServerBindingRecipeOptions:

      anyOf:
        - $ref: '#/components/schemas/DockerComposeRecipeOptions'
        - type: object
          additionalProperties: true
          description: Existing recipe-specific options for laravel, php, node, and go.

    DockerComposeExecutionPlan:

      type: object

      description: Safe Docker Compose execution metadata stored in deployments.meta.execution_plan.

      properties:

        compose_file: { type: string }

        env_file: { type: string, nullable: true }

        compose_source: { type: string, enum: [ repository ] }

        source_ref: { type: string, nullable: true }

        source_revision: { type: string, nullable: true }

        compose_project_name: { type: string }

        compose_project_directory: { type: string, nullable: true }

        compose_file_realpath: { type: string, nullable: true }

        env_file_realpath: { type: string, nullable: true }

        image_transport: { type: string, enum: [ archive_copy ] }

        rollback_supported: { type: boolean, enum: [ false ] }

        has_build: { type: boolean, nullable: true }

        service_count: { type: integer, nullable: true, minimum: 0 }

        generated_image_tags:
          type: object
          additionalProperties: { type: string }

        archive:
          type: object
          nullable: true
          properties:
            basename: { type: string }
            bytes: { type: integer, nullable: true, minimum: 0 }
            copied: { type: boolean }

        cleanup:
          type: object
          nullable: true
          additionalProperties: { type: boolean }

    DeploymentExecutionPlan:

      type: object

      properties:

        version: { type: integer }

        deployment_id: { type: string, description: "PublicId (ULID)" }

        project_id: { type: string, description: "PublicId (ULID)" }

        stage: { type: string, enum: [ dev, staging, prod ] }

        target_server_id: { type: string, description: "PublicId (ULID)" }

        build_server_id: { type: string, description: "PublicId (ULID)" }

        target_server: { $ref: '#/components/schemas/ServerSummary' }

        build_server: { $ref: '#/components/schemas/ServerSummary' }

        build_target_same_server: { type: boolean }

        fallback_reason: { type: string, enum: [ explicit_build_server, target_is_build, deployment_server_fallback ] }

        recipe: { $ref: '#/components/schemas/ServerBindingRecipe' }

        rollback_supported: { type: boolean }

        compose:
          $ref: '#/components/schemas/DockerComposeExecutionPlan'

        paths:
          type: object
          properties:
            deploy_path: { type: string }
            php_path: { type: string }
            artifact_staging_path: { type: string }

        lifecycle:
          type: object
          properties:
            has_test_cmd: { type: boolean }
            has_build_cmd: { type: boolean }
            has_before_symlink_cmd: { type: boolean }
            has_stop_cmd: { type: boolean }
            has_migrate_cmd: { type: boolean }
            has_after_symlink_cmd: { type: boolean }
            has_start_cmd: { type: boolean }
            has_restart_cmd: { type: boolean }
            upload_paths:
              type: array
              items: { type: string }

        keep_releases: { type: integer }

        resolved_at: { type: string, format: date-time }

    ServerBindingContract:

      description: |
        Canonical project-server binding (ProjectServerBindingService::mapBinding form).
        Differs from old ServerBinding: server-side view replaced by project-side view.

      type: object

      properties:

        id: { type: integer, description: "Pivot id (NOT a PublicId)" }

        server_id: { type: string, description: "PublicId (ULID)" }

        server_name: { type: string }

        server_host: { type: string }

        server_type: { type: string, enum: [ regular, build ] }

        build_server_id: { type: string, nullable: true, description: "PublicId (ULID)" }

        build_server:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ServerSummary'

        deploy_path: { type: string }

        php_path: { type: string, nullable: true }

        stage: { type: string, enum: [ dev, staging, prod ] }

        health_url: { type: string, nullable: true }

        recipe: { $ref: '#/components/schemas/ServerBindingRecipe' }

        keep_releases: { type: integer }

        recipe_options:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ServerBindingRecipeOptions'

        env_configured: { type: boolean }

        env_lines_count: { type: integer }

        created_at: { type: string, format: date-time }

        updated_at: { type: string, format: date-time }

    ServerDetailDeployment:

      type: object

      properties:

        id: { type: string, description: "PublicId (ULID)" }

        project_id: { type: string, description: "PublicId (ULID)" }

        project_name: { type: string, nullable: true }

        stage: { type: string, enum: [ dev, staging, prod ] }

        status: { type: string }

        trigger: { type: string, nullable: true }

        started_at: { type: string, format: date-time, nullable: true }

        finished_at: { type: string, format: date-time, nullable: true }

        cancelled_at: { type: string, format: date-time, nullable: true }

        error_message: { type: string, nullable: true }

        created_at: { type: string, format: date-time, nullable: true }

    ServerDetail:

      allOf:

        - $ref: '#/components/schemas/Server'

        - type: object

          properties:

            bindings:
              type: array
              items:
                $ref: '#/components/schemas/ServerBindingContract'

            recent_deployments:
              type: array
              items:
                $ref: '#/components/schemas/ServerDetailDeployment'

    ServerMetrics:

      type: object

      properties:

        status: { type: string, enum: [ available, unavailable ] }

        checked_at: { type: string, format: date-time }

        cpu:
          type: object
          properties:
            usage_percent: { type: number, nullable: true }

        memory:
          type: object
          properties:
            used_mb: { type: integer, nullable: true }
            total_mb: { type: integer, nullable: true }
            usage_percent: { type: number, nullable: true }

        disk:
          type: object
          properties:
            used_gb: { type: number, nullable: true }
            total_gb: { type: number, nullable: true }
            usage_percent: { type: number, nullable: true }
            mount: { type: string }

        error: { type: string, nullable: true }

    Deployment:

      type: object

      properties:

        id: { type: string, description: "PublicId (ULID)" }

        project_id: { type: string, description: "PublicId (ULID)" }

        server_id: { type: string, description: "PublicId (ULID)" }

        stage: { type: string, enum: [ dev, staging, prod ] }

        status: { type: string, enum: [ queued, running, success, failed, cancelled ] }

        trigger: { type: string, enum: [ api, webhook, manual ] }

        provider: { type: string }

        external_id: { type: string }

        started_at: { type: string, format: date-time }

        finished_at: { type: string, format: date-time, nullable: true }

        cancelled_at: { type: string, format: date-time, nullable: true }

        duration: { type: integer, nullable: true }

        error_message: { type: string, nullable: true }

        log: { type: string, nullable: true }

        meta:
          type: object
          properties:
            execution_plan: { $ref: '#/components/schemas/DeploymentExecutionPlan' }
          additionalProperties: true

        project:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DeploymentProjectSummary'

        server:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ServerSummary'

        created_at: { type: string, format: date-time }

        updated_at: { type: string, format: date-time }

    DeploymentStatus:

      type: string

      description: Runtime statuses (PHP enum covers pending/running/success/failed; queued/cancelled used via string constants)

      enum: [ queued, running, success, failed, cancelled ]

    WebhookSettings:

      type: object

      description: Inline payload form (WebhookSettingsController::payload, NOT WebhookResource)

      properties:

        id: { type: integer, nullable: true }

        project_id: { type: string, description: "PublicId (ULID)" }

        provider: { type: string, enum: [ custom, generic, github, gitlab ] }

        enabled: { type: boolean }

        secret_configured: { type: boolean }

        secret_visible: { type: boolean }

        secret: { type: string, nullable: true, description: "Returned only on creation/rotation, never on read" }

        url: { type: string, nullable: true }

        deploy_url: { type: string, nullable: true }

        created_at: { type: string, format: date-time, nullable: true }

        updated_at: { type: string, format: date-time, nullable: true }

    RepositoryValidationResult:

      type: object

      properties:

        valid: { type: boolean }

        repository:
          nullable: true
          type: object
          properties:
            name: { type: string }
            full_name: { type: string }
            description: { type: string }
            language: { type: string }
            stars: { type: integer }
            default_branch: { type: string }
            is_private: { type: boolean }

        message: { type: string, nullable: true }

    DeploymentTriggerResponse:

      type: object

      properties:

        id: { type: string, description: "PublicId (ULID)" }

        status: { type: string, enum: [ queued ] }

        message: { type: string }

    DeploymentCancelResponse:

      type: object

      properties:

        id: { type: string, description: "PublicId (ULID)" }

        status: { type: string, enum: [ cancelled ] }

        message: { type: string }

    AvailableServer:

      type: object

      properties:

        id: { type: string, description: "PublicId (ULID)" }

        name: { type: string }

        host: { type: string }

        server_type: { type: string, enum: [ regular, build ] }

    ServerEnvResponse:

      type: object

      properties:

        binding_id: { type: integer }

        env_content: { type: string }

    OkResponse:

      type: object

      properties:

        ok: { type: boolean }

    Error:

      type: object

      properties:

        message: { type: string }

    User:

      type: object

      properties:

        id: { type: integer }

        name: { type: string }

        email: { type: string, format: email }

        created_at: { type: string, format: date-time }

    ValidationError:

      type: object

      properties:

        message: { type: string }

        errors:

          type: object

          additionalProperties:

            type: array

            items: { type: string }

    Token:

      type: object

      description: |
        Sanctum Personal Access Token metadata. The `token` hash column is
        never serialized; the plain-text token is returned exactly once by
        POST /tokens in a separate `plain_text_token` field.

      properties:

        id: { type: integer }

        name: { type: string }

        abilities:
          type: array
          items:
            type: string
            enum: [ read, deploy, admin, '*' ]
          description: Token abilities. '*' grants god access.

        last_used_at: { type: string, format: date-time, nullable: true }

        expires_at: { type: string, format: date-time, nullable: true }

        created_at: { type: string, format: date-time }

    CreateTokenResponse:

      type: object

      description: Response of POST /tokens. The plain-text token is shown once.

      properties:

        token: { $ref: '#/components/schemas/Token' }

        plain_text_token:
          type: string
          description: Plain-text bearer token. Save it — shown only once.

  parameters:

    ProjectId:

      name: project

      in: path

      required: true

      schema:
        type: string
        pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
        description: PublicId (ULID)

    ServerId:

      name: server

      in: path

      required: true

      schema:
        type: string
        pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
        description: PublicId (ULID)

    DeploymentId:

      name: deployment

      in: path

      required: true

      schema:
        type: string
        pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
        description: PublicId (ULID)

paths:

  /auth/register:

    post:

      operationId: registerUser

      tags: [ Auth ]

      summary: Регистрация нового пользователя

      security: [ ]

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ name, email, password, password_confirmation ]
              properties:
                name: { type: string, example: "Иван Иванов" }
                email: { type: string, format: email, example: "ivan@example.com" }
                password: { type: string, format: password, minLength: 8, example: "password123" }
                password_confirmation: { type: string, format: password, example: "password123" }

      responses:

        "201":
          description: Успешная регистрация
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }

        "422":
          description: Ошибка валидации
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  /auth/login:

    post:

      operationId: loginUser

      tags: [ Auth ]

      summary: Вход в систему

      security: [ ]

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ email, password ]
              properties:
                email: { type: string, format: email, example: "ivan@example.com" }
                password: { type: string, format: password, example: "password123" }
                remember: { type: boolean, default: false, example: true }

      responses:

        "200":
          description: Успешный вход
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }

        "422":
          description: Ошибка валидации или неверные учетные данные
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

        "429":
          description: Слишком много попыток входа
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/logout:

    post:

      operationId: logoutUser

      tags: [ Auth ]

      summary: Выход из системы

      security: [ { sanctum: [ ] } ]

      responses:

        "200":
          description: Успешный выход
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Вы успешно вышли из системы" }

        "401":
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/user:

    get:

      operationId: getCurrentUser

      tags: [ Auth ]

      summary: Получение данных текущего пользователя

      security: [ { sanctum: [ ] } ]

      responses:

        "200":
          description: Данные пользователя
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

        "401":
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /profile:

    patch:

      operationId: updateProfile

      tags: [ Profile ]

      summary: Обновление данных профиля текущего пользователя

      description: |
        Частичное обновление name и/или email аутентифицированного
        пользователя. Оба поля опциональны; передаются только изменяемые.

      security: [ { sanctum: [ ] } ]

      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 255 }
                email: { type: string, format: email, maxLength: 255 }

      responses:

        "200":
          description: Профиль обновлён
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

        "401":
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

        "422":
          description: Ошибка валидации
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  /profile/password:

    patch:

      operationId: updatePassword

      tags: [ Profile ]

      summary: Смена пароля текущего пользователя

      description: |
        Смена пароля с проверкой текущего. Доступ ограничен
        (throttle 5 запросов в минуту) для защиты от перебора
        current_password при компрометации сессии.

      security: [ { sanctum: [ ] } ]

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ current_password, password, password_confirmation ]
              properties:
                current_password: { type: string, format: password }
                password: { type: string, format: password, minLength: 8 }
                password_confirmation: { type: string, format: password, minLength: 8 }

      responses:

        "200":
          description: Пароль обновлён
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

        "401":
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

        "422":
          description: Ошибка валидации (неверный current_password, слабый/неподтверждённый пароль)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  /tokens:

    get:

      operationId: listTokens

      x-required-ability: admin

      tags: [ Tokens ]

      summary: Список токенов текущего пользователя

      security: [ { sanctum: [ ] } ]

      description: |
        Возвращает PAT текущего пользователя без хеша. Для token-auth
        требует способность `admin` (session-auth = god-доступ).

      responses:

        "200":
          description: Список токенов
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Token' }

        "401": { description: Неавторизован }

        "403": { description: Недостаточно способностей (token без admin) }

    post:

      operationId: createToken

      x-required-ability: admin

      tags: [ Tokens ]

      summary: Создать Personal Access Token

      security: [ { sanctum: [ ] } ]

      description: |
        Создаёт PAT и возвращает plain-text значение ОДИН РАЗ. Сохраните его —
        повторно показать нельзя. Throttled 10/мин.

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ name, abilities ]
              properties:
                name: { type: string, maxLength: 255 }
                abilities:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum: [ read, deploy, admin, '*' ]
                expires_at: { type: string, format: date-time, nullable: true }

      responses:

        "201":
          description: Токен создан
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateTokenResponse' }

        "401": { description: Неавторизован }

        "422": { description: Ошибка валидации }

  /tokens/abilities:

    get:

      operationId: getCurrentTokenAbilities

      tags: [ Tokens ]

      summary: Abilities текущего токена (для MCP introspection)

      security: [ { sanctum: [ ] } ]

      description: |
        Возвращает abilities текущего access token. Для session-auth
        (TransientToken) возвращает `["*"]` (god-доступ). Используется
        MCP-сервером для introspection перед ability-filtering списка tools.

        Эндпоинт НЕ требует ability-gate: токен получает только свои СОБСТВЕННЫЕ
        abilities (он и так их знает), это не privilege-escalation. Любой
        аутентифицированный токен может introspect'ить себя — иначе read/deploy
        токены не смогли бы использовать MCP (chicken-and-egg с ability-filtering).

      responses:

        "200":
          description: Abilities текущего токена
          content:
            application/json:
              schema:
                type: object
                required: [ abilities ]
                properties:
                  abilities:
                    type: array
                    items:
                      type: string
                    description: |
                      Abilities токена (`read`, `deploy`, `admin`) или `["*"]`
                      для session-auth/TransientToken (god-доступ).

        "401": { description: Неавторизован (невалидный/просроченный токен) }

  /tokens/{token}:

    delete:

      operationId: deleteToken

      x-required-ability: admin

      tags: [ Tokens ]

      summary: Отозвать токен

      security: [ { sanctum: [ ] } ]

      description: |
        Отзывает PAT по числовому id (НЕ PublicId). Для token-auth требует `admin`.
        Отзыв используемого токена инвалидирует запросы с ним.

      parameters:

        - name: token
          in: path
          required: true
          schema: { type: integer }

      responses:

        "204": { description: Токен отозван }

        "401": { description: Неавторизован }

        "403": { description: Недостаточно способностей (token без admin) }

