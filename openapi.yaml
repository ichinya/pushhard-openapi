  # Public webhook receivers — also available from the root (web.php) for
  # proxies that only forward /api/*. No auth; signed payloads.
  /webhook/deploy/{project}/{token}:

    get:

      operationId: receiveDeployWebhookGet

      tags: [ Webhooks ]

      summary: Public deploy webhook (GET, custom token in path)

      security: [ ]

      parameters:

        - $ref: '#/components/parameters/ProjectId'

        - name: token
          in: path
          required: true
          schema: { type: string, pattern: '[A-Za-z0-9_-]+' }

      responses:

        "201": { description: Deploy queued }

        "200": { description: Skipped/dedup }

        "400": { description: Bad request }

    post:

      operationId: receiveDeployWebhookPost

      tags: [ Webhooks ]

      summary: Public deploy webhook (POST, custom token in path)

      security: [ ]

      parameters:

        - $ref: '#/components/parameters/ProjectId'

        - name: token
          in: path
          required: true
          schema: { type: string, pattern: '[A-Za-z0-9_-]+' }

      responses:

        "201": { description: Deploy queued }

        "200": { description: Skipped/dedup }

        "400": { description: Bad request }

  /webhook/github/{project}:

    post:

      operationId: receiveGithubWebhook

      tags: [ Webhooks ]

      summary: GitHub webhook receiver

      security: [ ]

      description: |
        Verifies X-Hub-Signature-256 HMAC header against the project's
        GitHub webhook secret. Throttled 30/мин.

      parameters:

        - $ref: '#/components/parameters/ProjectId'

      responses:

        "201": { description: Deploy queued }

        "200": { description: Skipped/dedup }

        "400": { description: Bad request }

        "401": { description: Bad signature }

  /webhook/gitlab/{project}:

    post:

      operationId: receiveGitlabWebhook

      tags: [ Webhooks ]

      summary: GitLab webhook receiver

      security: [ ]

      description: |
        Verifies webhook-signature (whsec_ ed25519) or X-Gitlab-Token against
        the project's GitLab webhook secret. Throttled 30/мин.

      parameters:

        - $ref: '#/components/parameters/ProjectId'

      responses:

        "201": { description: Deploy queued }

        "200": { description: Skipped/dedup }

        "400": { description: Bad request }

        "401": { description: Bad signature }
